<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模型数据库下拉样式预览</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #4f8ef7;
      --text: #e2e8f0;
      --text2: #8892a4;
      --font: 'Microsoft YaHei UI', 'Segoe UI', system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 10% 10%, #1a2140, var(--bg));
      color: var(--text);
      font-family: var(--font);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .preview-wrap {
      width: min(860px, 100%);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .preview-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: var(--surface);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.25);
    }

    .card-head {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 700;
      color: var(--text2);
      letter-spacing: .6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .db-row {
      padding: 8px 8px 8px;
      border-bottom: 1px solid var(--border);
    }

    .db-select {
      display: block;
      width: 100%;
      height: 32px;
      min-height: 32px;
      padding: 0 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      outline: none;
      cursor: pointer;
    }
    .db-select:focus { border-color: var(--accent); }

    /* A: 旧样式（12.5） */
    .v-old .db-select,
    .v-old .db-select option {
      font-family: var(--font);
      font-size: 12.5px;
      font-weight: 400;
      letter-spacing: 0;
    }

    /* B: 与“模型浏览器”标题一致 */
    .v-match .db-select,
    .v-match .db-select option {
      font-family: var(--font);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .6px;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      flex: 1;
      text-align: center;
      font-size: 11.5px;
      padding: 8px 4px;
      color: var(--text2);
    }
    .tab.active {
      color: var(--accent);
      border-bottom: 2px solid var(--accent);
      padding-bottom: 6px;
      font-weight: 600;
    }

    .body {
      padding: 12px;
      font-size: 12px;
      color: var(--text2);
      line-height: 1.6;
    }

    .tag {
      display: inline-block;
      margin-top: 6px;
      font-size: 11px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 8px;
      color: var(--text2);
      background: rgba(79, 142, 247, 0.1);
    }

    @media (max-width: 820px) {
      .preview-wrap { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="preview-wrap">
    <section class="preview-card v-old">
      <div class="card-head">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        模型浏览器
      </div>
      <div class="db-row">
        <select class="db-select">
          <option>Sales Data Model</option>
          <option>Finance Reporting</option>
          <option>Customer360 Production</option>
          <option>Inventory_2026_Q1</option>
        </select>
      </div>
      <div class="tabs">
        <div class="tab active">表</div>
        <div class="tab">关系</div>
        <div class="tab">度量值</div>
        <div class="tab">角色</div>
      </div>
      <div class="body">
        旧样式：12.5px，普通字重。
        <div class="tag">A 方案（旧）</div>
      </div>
    </section>

    <section class="preview-card v-match">
      <div class="card-head">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        模型浏览器
      </div>
      <div class="db-row">
        <select class="db-select">
          <option>Sales Data Model</option>
          <option>Finance Reporting</option>
          <option>Customer360 Production</option>
          <option>Inventory_2026_Q1</option>
        </select>
      </div>
      <div class="tabs">
        <div class="tab active">表</div>
        <div class="tab">关系</div>
        <div class="tab">度量值</div>
        <div class="tab">角色</div>
      </div>
      <div class="body">
        目标样式：与“模型浏览器”标题一致（12px、700、字距 .6）。
        <div class="tag">B 方案（建议）</div>
      </div>
    </section>
  </div>
</body>
</html>
